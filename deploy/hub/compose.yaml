services:
  api:
    image: registry.podwarden.com/podwarden/apps/vllm-warden:${VERSION:-latest}
    restart: unless-stopped
    ports:
      - "8080:8080"
    # Share the host PID namespace so /api/system/gpus can attribute
    # nvidia-smi compute holders (host PIDs) to supervisor-tracked vLLM
    # processes. Without this, supervisor stores in-container PIDs and
    # attribution silently falls back to kind: external. See vllm-warden#42.
    #
    # NOTE: PodWarden's compose-to-K8s translation (compose_bridge.py) does
    # NOT currently honour `pid: host` — it has no hostPID / pid_mode
    # handling. Filed as a follow-up bug; until that lands, K8s-rendered
    # vllm-warden deployments will silently degrade to kind: external for
    # all model holders. Standalone compose / `make docker-run` work fine.
    pid: host
    environment:
      # Optional: when blank, the API falls back to the localhost default
      # (see app/config.py — an explicitly-empty value is treated as unset by
      # design so a blank env var never locks admins out). Set it to your
      # public UI origin to harden the CSRF/Origin check on /api/auth/*.
      VW_FRONTEND_ORIGIN: "${WARDEN_FRONTEND_ORIGIN:-}"
      VW_COOKIE_SECRET: "${VW_COOKIE_SECRET:?VW_COOKIE_SECRET required (32+ chars) for session cookie signing}"
      VW_CONTAINER_GPU_COUNT: "${VW_CONTAINER_GPU_COUNT:-1}"
      VW_JWT_SECRET: "${VW_JWT_SECRET:-}"
      # Runtime override path for the version banner. The backend
      # Dockerfile bakes VW_BUILD_VERSION / VW_BUILD_SHA at build time
      # via --build-arg (see docs/releasing.md). These env entries let
      # the release engineer override the baked values at deploy time
      # without rebuilding — useful when a release was published without
      # the build-args (see #45 / vdev · unknown banner regression).
      VW_BUILD_VERSION: "${VW_BUILD_VERSION:-dev}"
      VW_BUILD_SHA: "${VW_BUILD_SHA:-unknown}"
    volumes:
      - vllm-warden-data:/data
      - vllm-warden-hfcache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  ui:
    image: registry.podwarden.com/podwarden/apps/vllm-warden-ui:${VERSION:-latest}
    restart: unless-stopped
    ports:
      - "${WARDEN_PORT:-3000}:3000"
    environment:
      BACKEND_URL: http://api:8080
      NEXT_PUBLIC_BACKEND_URL: "${WARDEN_PUBLIC_BACKEND_URL:?required}"
    depends_on:
      - api

volumes:
  vllm-warden-data:
  vllm-warden-hfcache:
